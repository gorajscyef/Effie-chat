<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Effie</title>

<style>
:root{
  --bg:#000000;
  --gold:#cdae75;
  --border: rgba(205,174,117,.35);
  --panel: rgba(255,255,255,.04);

  --effieBubble: rgba(255,255,255,.05);
  --userBubble: rgba(13,22,40,.92);
  --userText:#ffffff;
  --effieText: var(--gold);

  --inputBg: rgba(255,255,255,.06);
  --btnBg: var(--gold);
  --btnText:#1a1a1a;
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--gold);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  overflow:hidden;
}

.stage{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
}

/* INTRO */
#intro{opacity:1;transition:opacity 700ms ease;}
.intro-wrap{
  width:min(520px,100%);
  height:min(720px,100%);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  position:relative;
}
.intro-video{
  width:100%;
  height:100%;
  object-fit:cover;
}
.intro-skip{
  position:absolute;
  bottom:14px;
  right:14px;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(0,0,0,.45);
  color:var(--gold);
  cursor:pointer;
}

/* CHAT */
#chat{display:none;opacity:0;transition:opacity 700ms ease;}
.chat-shell{
  width:min(520px,100%);
  height:min(720px,100%);
  border:1px solid var(--border);
  border-radius:14px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.chat-header{
  padding:14px;
  text-align:center;
  border-bottom:1px solid var(--border);
  letter-spacing:.2em;
  font-weight:600;
  font-size:14px;
}
.chat-body{
  flex:1;
  padding:14px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.msg{
  max-width:85%;
  padding:10px 12px;
  border-radius:14px;
  font-size:16px;
  white-space:pre-wrap;
}
.msg.effie{
  align-self:flex-start;
  background:var(--effieBubble);
  color:var(--effieText);
}
.msg.user{
  align-self:flex-end;
  background:var(--userBubble);
  color:var(--userText);
}
.chat-input{
  padding:10px;
  border-top:1px solid var(--border);
  display:flex;
  gap:10px;
}
.chat-input input{
  flex:1;
  height:44px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:var(--inputBg);
  color:var(--gold);
  padding:0 12px;
  font-size:16px;
}
.chat-input button{
  height:44px;
  min-width:88px;
  border:none;
  border-radius:12px;
  background:var(--btnBg);
  color:var(--btnText);
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="intro" class="stage">
  <div class="intro-wrap">
    <video class="intro-video" autoplay muted playsinline preload="auto">
      <source src="https://adilo.bigcommand.com/738d463d-1007-4047-976e-217a85184554.mp4" type="video/mp4"/>
    </video>
    <button class="intro-skip" id="skipBtn">Skip</button>
  </div>
</div>

<div id="chat" class="stage">
  <div class="chat-shell">
    <div class="chat-header">EFFIE</div>
    <div class="chat-body" id="chatBody">
      <div class="msg effie">Hi. I'm here.</div>
    </div>
    <div class="chat-input">
      <input id="userInput" placeholder="Say anything..." autocomplete="off"/>
      <button id="sendBtn" disabled>Send</button>
    </div>
  </div>
</div>

<script>

const INTRO_MS = 5000;
const FADE_MS = 700;

const intro = document.getElementById('intro');
const chat  = document.getElementById('chat');
const chatBody = document.getElementById('chatBody');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const skipBtn = document.getElementById('skipBtn');

let switched = false;
let busy = false;

/* ===== USER ID ===== */
const STORAGE_USER_ID_KEY = "effie_user_id_v1";
function getOrCreateUserId(){
  let id = localStorage.getItem(STORAGE_USER_ID_KEY);
  if(!id){
    id = "ef_" + crypto.randomUUID();
    localStorage.setItem(STORAGE_USER_ID_KEY,id);
  }
  return id;
}
const USER_ID = getOrCreateUserId();

/* ===== LOCAL MEMORY ===== */
const STORAGE_HISTORY_KEY = "effie_history_v1";
const STORAGE_LASTDATE_KEY = "effie_last_date_v1";

function todayKey(){ return new Date().toISOString().slice(0,10); }

function loadHistory(){
  try{
    const raw = localStorage.getItem(STORAGE_HISTORY_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr)?arr:[];
  }catch{return [];}
}
function saveHistory(arr){
  localStorage.setItem(STORAGE_HISTORY_KEY,JSON.stringify(arr.slice(-10)));
}
function hasTalkedToday(){
  return localStorage.getItem(STORAGE_LASTDATE_KEY)===todayKey();
}
function markTalkedToday(){
  localStorage.setItem(STORAGE_LASTDATE_KEY,todayKey());
}

/* ===== CHAT UI ===== */
function addUserMessage(text){
  const el=document.createElement('div');
  el.className='msg user';
  el.textContent=text;
  chatBody.appendChild(el);
  chatBody.scrollTop=chatBody.scrollHeight;
}
function addEffieMessage(text){
  const el=document.createElement('div');
  el.className='msg effie';
  el.textContent=text;
  chatBody.appendChild(el);
  chatBody.scrollTop=chatBody.scrollHeight;
}
function setBusy(state){
  busy=state;
  input.disabled=state;
  sendBtn.disabled=state||input.value.trim()==="";
  sendBtn.textContent=state?"...":"Send";
}

input.addEventListener('input',()=>setBusy(false));

async function handleSend(){
  const text=input.value.trim();
  if(!text||busy)return;

  addUserMessage(text);
  input.value='';
  setBusy(true);

  const history=loadHistory();
  history.push({role:"user",content:text});
  saveHistory(history);

  const typing=addEffieMessage("…");

  try{
    const res=await fetch('/.netlify/functions/effie',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        message:text,
        history:loadHistory(),
        meta:{
          user_id:USER_ID,
          hasTalkedToday:hasTalkedToday()
        }
      })
    });

    const data=await res.json();
    const reply=data.reply||"I'm here.";
    typing.textContent=reply;

    const h2=loadHistory();
    h2.push({role:"assistant",content:reply});
    saveHistory(h2);

    markTalkedToday();

  }catch{
    typing.textContent="Connection error.";
  }finally{
    setBusy(false);
    input.focus();
  }
}

sendBtn.addEventListener('click',handleSend);
input.addEventListener('keydown',e=>{
  if(e.key==="Enter"){e.preventDefault();handleSend();}
});

function switchToChat(){
  if(switched)return;
  switched=true;
  intro.style.opacity='0';
  setTimeout(()=>{
    intro.style.display='none';
    chat.style.display='flex';
    requestAnimationFrame(()=>{
      chat.style.opacity='1';
      document.body.style.overflow='auto';
      input.focus();
    });
  },FADE_MS);
}

skipBtn.addEventListener('click',switchToChat);
setTimeout(switchToChat,INTRO_MS);

</script>
</body>
</html>
