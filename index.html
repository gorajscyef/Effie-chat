<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="format-detection" content="telephone=no">

<title>Effie</title>

<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>

:root{
--bg:#000000;
--gold:#cdae75;
--border: rgba(205,174,117,.35);

--effieBubble: rgba(255,255,255,.05);
--userBubble: rgba(13,22,40,.92);
--userText:#ffffff;
--effieText: var(--gold);

--inputBg: rgba(255,255,255,.06);
--btnBg: var(--gold);
--btnText:#1a1a1a;

--saveBg: rgba(255,255,255,.06);
--saveBorder: rgba(205,174,117,.25);
}

*{box-sizing:border-box}

html,body{height:100%}

body{
margin:0;
background:var(--bg);
color:var(--gold);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
-webkit-font-smoothing:antialiased;
-webkit-touch-callout:none;
overflow:auto;
}

.stage{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
padding:max(12px,env(safe-area-inset-top))
max(12px,env(safe-area-inset-right))
max(12px,env(safe-area-inset-bottom))
max(12px,env(safe-area-inset-left));
}

#chat{
display:flex;
opacity:1;
}

.chat-shell{
width:min(520px,100%);
height:min(720px,100%);
border:1px solid var(--border);
border-radius:14px;
background:rgba(255,255,255,.02);
display:flex;
flex-direction:column;
overflow:hidden;
}

.chat-header{
padding:14px 16px;
border-bottom:1px solid var(--border);
text-align:center;
letter-spacing:.06em;
font-weight:500;
font-size:17px;
}

.chat-body{
flex:1;
padding:14px 16px 10px;
overflow:auto;
display:flex;
flex-direction:column;
gap:18px;
}

.msg{
max-width:85%;
padding:14px 16px;
border-radius:18px;
line-height:1.75;
font-size:19px;
border:1px solid rgba(255,255,255,.06);
box-shadow:0 4px 16px rgba(0,0,0,.25);
white-space:pre-wrap;
word-wrap:break-word;
}

.msg.effie{
align-self:flex-start;
background:var(--effieBubble);
color:var(--effieText);
border-color:rgba(205,174,117,.18);
}

.msg.user{
align-self:flex-end;
background:var(--userBubble);
color:var(--userText);
border-color:rgba(255,255,255,.09);
}

.effie-wrap{
align-self:flex-start;
display:flex;
flex-direction:column;
gap:10px;
max-width:85%;
}

.reflection-actions{
display:flex;
gap:10px;
align-items:center;
}

.save-btn{
padding:10px 12px;
border-radius:12px;
border:1px solid var(--saveBorder);
background:var(--saveBg);
color:var(--gold);
cursor:pointer;
font-weight:600;
font-size:14px;
}

.save-btn:active{transform:translateY(1px)}

.save-btn[disabled]{
opacity:.55;
cursor:not-allowed;
}

.save-status{
font-size:13px;
color:rgba(205,174,117,.8);
}

.chat-input{
padding:10px;
border-top:1px solid var(--border);
display:flex;
gap:10px;
background:rgba(0,0,0,.22);
}

.chat-input input{
flex:1;
height:44px;
border-radius:12px;
border:1px solid rgba(255,255,255,.10);
background:var(--inputBg);
color:var(--gold);
padding:0 12px;
font-size:16px;
outline:none;
}

.chat-input input::placeholder{
color:rgba(205,174,117,.55);
}

.chat-input button{
height:44px;
min-width:88px;
border:none;
border-radius:12px;
background:var(--btnBg);
color:var(--btnText);
font-weight:700;
font-size:15px;
cursor:pointer;
}

.chat-input button:active{transform:translateY(1px)}

.chat-input button:disabled{
opacity:.55;
cursor:not-allowed;
}

@media(max-height:760px){
.chat-shell{height:100%}
}

@media(max-width:560px){
.chat-shell{
width:100%;
height:100%;
border-radius:0;
}

.stage{
padding:
env(safe-area-inset-top)
env(safe-area-inset-right)
env(safe-area-inset-bottom)
env(safe-area-inset-left);
}
}

</style>
</head>

<body>

<div id="chat" class="stage">

<div class="chat-shell">

<div class="chat-header">Effie</div>

<div class="chat-body" id="chatBody">
<div class="msg effie">Hi. I'm here.</div>
</div>

<div class="chat-input">
<input id="userInput" type="text" placeholder="Say anything..." autocomplete="off">
<button id="sendBtn" type="button" disabled>Send</button>
</div>

</div>
</div>

<script defer>

const MEMORY_URL="https://script.google.com/macros/s/AKfycbzAS9gvvriYvCxyI8ziAn-ZD0rBaIpT3JTi8-qQN4UJzxKDQ6q8nMZrFHE_lKHh8G7DNw/exec"

const chatBody=document.getElementById("chatBody")
const input=document.getElementById("userInput")
const sendBtn=document.getElementById("sendBtn")

let busy=false

const STORAGE_USER_ID_KEY="effie_user_id_v1"

function getOrCreateUserId(){
let id=localStorage.getItem(STORAGE_USER_ID_KEY)
if(!id){
id="ef_"+crypto.randomUUID()
localStorage.setItem(STORAGE_USER_ID_KEY,id)
}
return id
}

const USER_ID=getOrCreateUserId()

const STORAGE_HISTORY_KEY="effie_history_v1"
const STORAGE_LASTDATE_KEY="effie_last_date_v1"

function todayKey(){
return new Date().toISOString().slice(0,10)
}

function loadHistory(){
try{
const raw=localStorage.getItem(STORAGE_HISTORY_KEY)
const arr=raw?JSON.parse(raw):[]
return Array.isArray(arr)?arr:[]
}catch{return[]}
}

function saveHistory(arr){
const trimmed=arr.slice(-10)
localStorage.setItem(STORAGE_HISTORY_KEY,JSON.stringify(trimmed))
}

function hasTalkedToday(){
return localStorage.getItem(STORAGE_LASTDATE_KEY)===todayKey()
}

function markTalkedToday(){
localStorage.setItem(STORAGE_LASTDATE_KEY,todayKey())
}

function setSendEnabled(){
sendBtn.disabled=busy||input.value.trim().length===0
}

input.addEventListener("input",setSendEnabled)

function addUserMessage(text){
const el=document.createElement("div")
el.className="msg user"
el.textContent=text
chatBody.appendChild(el)
chatBody.scrollTop=chatBody.scrollHeight
}

function addEffieMessage(text){
const el=document.createElement("div")
el.className="msg effie"
el.textContent=text
chatBody.appendChild(el)
chatBody.scrollTop=chatBody.scrollHeight
}

function setBusy(state){
busy=state
input.disabled=state
setSendEnabled()
sendBtn.textContent=state?"...":"Send"
}

async function handleSend(){

const text=input.value.trim()
if(!text||busy)return

addUserMessage(text)

input.value=""
setBusy(true)

const h1=loadHistory()
h1.push({role:"user",content:text})
saveHistory(h1)

const typing=document.createElement("div")
typing.className="msg effie"
typing.textContent="…"
chatBody.appendChild(typing)

try{

const res=await fetch("/.netlify/functions/effie",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
history:loadHistory(),
meta:{
user_id:USER_ID,
hasTalkedToday:hasTalkedToday(),
today:todayKey()
}
})
})

let data={}
try{data=await res.json()}catch(e){}

if(!res.ok){
typing.textContent="Server error."
}else{

const reply=(data.reply||"I'm here.").trim()

typing.remove()

addEffieMessage(reply)

const h2=loadHistory()
h2.push({role:"assistant",content:reply})
saveHistory(h2)

markTalkedToday()
}

}catch(e){
typing.textContent="Connection error."
}

finally{
setBusy(false)
input.focus()
}

}

sendBtn.addEventListener("click",handleSend)

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
e.preventDefault()
handleSend()
}
})

function renderSavedHistory(){

const history=loadHistory()

if(!history.length)return

chatBody.innerHTML=""

history.forEach(m=>{
if(m.role==="user")addUserMessage(m.content)
if(m.role==="assistant")addEffieMessage(m.content)
})

chatBody.scrollTop=chatBody.scrollHeight
}

renderSavedHistory()

input.focus()
setSendEnabled()

</script>
</body>
</html>
